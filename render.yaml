services:
  - type: web
    name: xauusd-signal-desk
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DISPLAY_SYMBOL
        value: XAUUSD
      - key: DATA_PROVIDER
        value: binance
      - key: BINANCE_SYMBOL
        value: PAXGUSDT
      - key: YAHOO_SYMBOL
        value: GC=F
